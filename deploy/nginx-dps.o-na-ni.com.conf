# NTE DPS Toolkit landing page — dps.o-na-ni.com
# Drop into /etc/nginx/sites-available/ and symlink into sites-enabled/,
# or /etc/nginx/conf.d/ depending on your distro layout.
# This is a separate server block keyed on server_name, so it will not
# interfere with whatever else is already running on o-na-ni.com.

server {
    listen 80;
    listen [::]:80;
    server_name dps.o-na-ni.com;

    root /var/www/dps.o-na-ni.com;
    index index.html;

    # Needed for certbot's HTTP-01 challenge before HTTPS is set up.
    location /.well-known/acme-challenge/ {
        root /var/www/dps.o-na-ni.com;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /robots.txt { access_log off; }
    location = /sitemap.xml { access_log off; }

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
}

# After `certbot --nginx -d dps.o-na-ni.com` runs, it will add its own
# 443 server block (and rewrite the block above into an HTTP->HTTPS
# redirect) automatically. No need to hand-write the SSL block.
