name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    name: Windows release build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

      - name: Build release executable
        run: cargo build --release

      - name: Prepare release package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/nte-dps-tool.exe dist/
          Copy-Item README.md, LICENSE, NOTICE.md, THIRD_PARTY_LICENSES.md dist/
          Compress-Archive -Path dist/* -DestinationPath nte-dps-tool-windows.zip -Force

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: nte-dps-tool-windows-${{ github.sha }}
          if-no-files-found: error
          path: |
            nte-dps-tool-windows.zip
            target/release/nte-dps-tool.exe

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/master'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TITLE: Latest Windows build
        run: |
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $releaseTag = "build-$env:GITHUB_RUN_NUMBER-$env:GITHUB_RUN_ATTEMPT-$shortSha"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $releaseTag $env:GITHUB_SHA
          git push origin "refs/tags/$releaseTag"

          $notes = @(
            "自动构建：$env:GITHUB_SHA"
            ""
            "中文更新内容："
            "- DPS 时间支持扣除大招时停：大招动画时停按资源表中的 end_ability_event_seconds 计算。"
            "- 支持额外时停机制，固定大招动画时停和额外时停会按区间并集扣除，重叠部分只扣一次。"
            "- 控制台新增 DPS 时间口径切换，可在'扣除时停'和'现实时间'之间切换。"
            "- 改进深渊下半场直接开始抓包、当前半场重开后的统计归属。"
          ) -join "`n"
          gh release create $releaseTag nte-dps-tool-windows.zip target/release/nte-dps-tool.exe --title $env:RELEASE_TITLE --notes $notes --latest
