name: Build

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "res/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "THIRD_PARTY_LICENSES.md"
      - "licenses/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches:
      - master
    paths:
      - "src/**"
      - "res/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "THIRD_PARTY_LICENSES.md"
      - "licenses/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    name: Windows release build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release variants
        shell: pwsh
        run: |
          cargo build --release
          New-Item -ItemType Directory -Force dist/nte-dps-tool-windows-debug | Out-Null
          Copy-Item target/release/nte-dps-tool.exe dist/nte-dps-tool-windows-debug/

          cargo build --release --features no_debug
          New-Item -ItemType Directory -Force dist/nte-dps-tool-windows-nodebug | Out-Null
          Copy-Item target/release/nte-dps-tool.exe dist/nte-dps-tool-windows-nodebug/

          cargo build --release --features "no_debug external_resources"
          New-Item -ItemType Directory -Force dist/nte-dps-tool-windows-external-resources | Out-Null
          Copy-Item target/release/nte-dps-tool.exe dist/nte-dps-tool-windows-external-resources/
          Copy-Item res dist/nte-dps-tool-windows-external-resources/res -Recurse

      - name: Prepare release packages
        shell: pwsh
        run: |
          $variantNotes = @{
            "nte-dps-tool-windows-debug" = @"
          # NTE DPS Tool - Windows Debug Variant

          - Release optimization build with diagnostics and debug panels enabled.
          - Runtime resources are embedded in the executable.
          - JSON resources are minified during embedding, and PNG resources may be embedded as smaller WebP bytes.
          - Use this build when validating capture, resource coverage, imports, and diagnostics.
          "@
            "nte-dps-tool-windows-nodebug" = @"
          # NTE DPS Tool - Windows No-Debug Variant

          - Release optimization build with the no_debug feature enabled.
          - Runtime resources are embedded in the executable.
          - JSON resources are minified during embedding, and PNG resources may be embedded as smaller WebP bytes.
          - Use this as the normal end-user standalone executable.
          "@
            "nte-dps-tool-windows-external-resources" = @"
          # NTE DPS Tool - Windows External Resources Variant

          - Release optimization build with no_debug and external_resources enabled.
          - Runtime resources are not embedded in the executable.
          - Keep the bundled res directory beside nte-dps-tool.exe.
          - Use this build when minimizing executable size or updating resources without rebuilding the binary.
          "@
          }

          foreach ($variant in $variantNotes.Keys) {
            Copy-Item THIRD_PARTY_LICENSES.md "dist/$variant/"
            Copy-Item licenses "dist/$variant/licenses" -Recurse
            $variantNotes[$variant] | Set-Content -Encoding UTF8 "dist/$variant/BUILD_VARIANT.md"
            Compress-Archive -Path "dist/$variant/*" -DestinationPath "$variant.zip" -Force
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nte-dps-tool-windows-${{ github.sha }}
          if-no-files-found: error
          path: |
            nte-dps-tool-windows-debug.zip
            nte-dps-tool-windows-nodebug.zip
            nte-dps-tool-windows-external-resources.zip

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/master'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TITLE: Latest Windows build
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $crateVersion = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          $releaseTag = "v$crateVersion-build-$env:GITHUB_RUN_NUMBER-$shortSha"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $releaseTag $env:GITHUB_SHA
          git push origin "refs/tags/$releaseTag"

          # Derive the changelog from the commits actually pushed in this run. Fall back
          # to the last 20 commits for manual dispatch / first push where the range is empty.
          $emptySha = "0000000000000000000000000000000000000000"
          $commitLines = $null
          if ($env:EVENT_BEFORE -and $env:EVENT_BEFORE -ne $emptySha) {
            $commitLines = git log --no-merges --pretty=format:"- %s" "$env:EVENT_BEFORE..$env:GITHUB_SHA"
          }
          if (-not $commitLines) {
            $commitLines = git log --no-merges -n 20 --pretty=format:"- %s"
          }

          $notes = @(
            "版本：v$crateVersion"
            "自动构建：$env:GITHUB_SHA"
            ""
            "本次改动："
            $commitLines
            ""
            "构建产物："
            "- nte-dps-tool-windows-debug.zip：带诊断/调试入口，资源内嵌。"
            "- nte-dps-tool-windows-nodebug.zip：关闭调试入口，资源内嵌，推荐普通使用。"
            "- nte-dps-tool-windows-external-resources.zip：关闭调试入口，资源外置，需保持 res 目录与 exe 同级。"
          ) -join "`n"
          gh release create $releaseTag `
            nte-dps-tool-windows-debug.zip `
            nte-dps-tool-windows-nodebug.zip `
            nte-dps-tool-windows-external-resources.zip `
            --title $env:RELEASE_TITLE `
            --notes $notes `
            --latest
