name: Build

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "native/**"
      - "plugins/**"
      - "res/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "docs/**"
      - "README.md"
      - "README_EN.md"
      - "THIRD_PARTY_LICENSES.md"
      - "licenses/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches:
      - master
    paths:
      - "src/**"
      - "native/**"
      - "plugins/**"
      - "res/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "docs/**"
      - "README.md"
      - "README_EN.md"
      - "THIRD_PARTY_LICENSES.md"
      - "licenses/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  UPX_VERSION: 5.2.0
  UPX_SHA256: b471ebf1b7f20f4a89150264ed9a008a2a5bfd247f3c6d1184a75bb59ca08f5d

jobs:
  windows-release:
    name: Windows quality gates and release build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build native equipment plugin
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installation = & $vswhere `
            -latest `
            -products '*' `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if (-not $installation) {
            throw "Visual Studio with the MSVC x64 toolset was not found"
          }

          $msbuild = Join-Path $installation "MSBuild\Current\Bin\MSBuild.exe"
          & $msbuild `
            native/nte-equipment-plugin/nte-equipment-plugin.sln `
            /t:Clean,Build `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          if (-not (Test-Path -LiteralPath plugins/dwmapi.dll -PathType Leaf)) {
            throw "Native build did not stage plugins/dwmapi.dll"
          }

      - name: Check formatting
        run: cargo fmt --check

      - name: Check default GUI build
        run: cargo check

      - name: Test default GUI build
        run: cargo test

      - name: Check GUI and CLI targets
        shell: pwsh
        run: |
          cargo check --bin nte-dps-tool --features gui
          cargo check --bin nte-core --no-default-features --features cli

      - name: Lint GUI and CLI targets
        shell: pwsh
        run: |
          cargo clippy --bin nte-dps-tool --features gui -- -D warnings
          cargo clippy --bin nte-core --no-default-features --features cli -- -D warnings

      - name: Test GUI and CLI targets
        shell: pwsh
        run: |
          cargo test --features gui
          cargo test --no-default-features --features cli
          cargo test --features "gui external_resources"

      - name: Verify CLI dependency tree
        shell: pwsh
        run: |
          $tree = cargo tree -e normal --no-default-features --features cli
          $tree
          $forbidden = $tree | Select-String -Pattern '(^|[ ├└─])(eframe|egui|wgpu|rfd|raw-window-handle) v'
          if ($forbidden) {
            Write-Error "CLI dependency tree contains GUI crates:`n$($forbidden -join "`n")"
            exit 1
          }

      - name: Build release variants
        shell: pwsh
        run: |
          cargo build --release --bin nte-dps-tool --features gui
          New-Item -ItemType Directory -Force dist/nte-dps-tool-windows-x64 | Out-Null
          Copy-Item target/release/nte-dps-tool.exe dist/nte-dps-tool-windows-x64/
          Copy-Item plugins dist/nte-dps-tool-windows-x64/plugins -Recurse

          cargo build --release --bin nte-core --no-default-features --features cli
          New-Item -ItemType Directory -Force dist/nte-core-windows-x64 | Out-Null
          Copy-Item target/release/nte-core.exe dist/nte-core-windows-x64/
          Copy-Item docs/CLI_PROTOCOL.md dist/nte-core-windows-x64/
          Copy-Item docs/CLI_PROTOCOL_ZH.md dist/nte-core-windows-x64/
          Copy-Item docs/examples dist/nte-core-windows-x64/examples -Recurse

          cargo build --release --bin nte-dps-tool --features "gui external_resources"
          New-Item -ItemType Directory -Force dist/nte-dps-tool-windows-external-resources | Out-Null
          Copy-Item target/release/nte-dps-tool.exe dist/nte-dps-tool-windows-external-resources/
          Copy-Item res dist/nte-dps-tool-windows-external-resources/res -Recurse
          Copy-Item plugins dist/nte-dps-tool-windows-external-resources/plugins -Recurse

      - name: Compress release executables with UPX
        shell: pwsh
        run: |
          $archive = "$env:RUNNER_TEMP/upx-$env:UPX_VERSION-win64.zip"
          $upxRoot = "$env:RUNNER_TEMP/upx"
          Invoke-WebRequest `
            -Uri "https://github.com/upx/upx/releases/download/v$env:UPX_VERSION/upx-$env:UPX_VERSION-win64.zip" `
            -OutFile $archive

          $actualHash = (Get-FileHash -Path $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:UPX_SHA256) {
            throw "UPX archive checksum mismatch: expected $env:UPX_SHA256, got $actualHash"
          }

          Expand-Archive -Path $archive -DestinationPath $upxRoot -Force
          $upx = Get-ChildItem -Path $upxRoot -Filter upx.exe -Recurse | Select-Object -First 1
          if (-not $upx) {
            throw "upx.exe was not found in the downloaded archive"
          }

          $executables = @(Get-ChildItem -Path dist -Filter *.exe -Recurse)
          if ($executables.Count -eq 0) {
            throw "No release executables were found under dist"
          }

          foreach ($executable in $executables) {
            & $upx.FullName -9 $executable.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "UPX compression failed for $($executable.FullName)"
            }

            & $upx.FullName -t $executable.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "UPX integrity test failed for $($executable.FullName)"
            }
          }

      - name: Prepare release packages
        shell: pwsh
        run: |
          $variantNotes = @{
            "nte-dps-tool-windows-x64" = @"
          # NTE DPS Tool - Windows x64

          - Standard GUI release with F12, Packets, Resources, and Diagnostics available.
          - Runtime resources are embedded in the executable.
          - The optional in-game equipment plugin is loaded from plugins/dwmapi.dll and is installed only after the timed risk confirmation.
          - JSON resources are minified during embedding, and PNG resources may be embedded as smaller WebP bytes.
          - The executable is compressed with UPX -9 and integrity-tested before packaging.
          "@
            "nte-core-windows-x64" = @"
          # NTE Core - Windows x64

          - Local JSON-RPC 2.0 over NDJSON stdio sidecar for third-party integrations.
          - Does not open a network port and does not include GUI images or GUI dependencies.
          - Read CLI_PROTOCOL.md or CLI_PROTOCOL_ZH.md before integrating.
          - The executable is compressed with UPX -9 and integrity-tested before packaging.
          "@
            "nte-dps-tool-windows-external-resources" = @"
          # NTE DPS Tool - Windows External Resources Variant

          - Standard GUI release with F12 and all diagnostics available.
          - Runtime resources are not embedded in the executable.
          - The optional in-game equipment plugin is loaded from plugins/dwmapi.dll and is installed only after the timed risk confirmation.
          - Keep the bundled res directory beside nte-dps-tool.exe.
          - Use this build when minimizing executable size or updating resources without rebuilding the binary.
          - The executable is compressed with UPX -9 and integrity-tested before packaging.
          "@
          }

          foreach ($variant in $variantNotes.Keys) {
            Copy-Item THIRD_PARTY_LICENSES.md "dist/$variant/"
            Copy-Item licenses "dist/$variant/licenses" -Recurse
            $variantNotes[$variant] | Set-Content -Encoding UTF8 "dist/$variant/BUILD_VARIANT.md"
            Compress-Archive -Path "dist/$variant/*" -DestinationPath "$variant.zip" -Force
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nte-windows-${{ github.sha }}
          if-no-files-found: error
          path: |
            nte-dps-tool-windows-x64.zip
            nte-core-windows-x64.zip
            nte-dps-tool-windows-external-resources.zip

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/master'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $crateVersion = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          $releaseTag = "v$crateVersion-build-$env:GITHUB_RUN_NUMBER-$shortSha"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $releaseTag $env:GITHUB_SHA
          git push origin "refs/tags/$releaseTag"

          # Accumulate every commit for the current crate version, including commits
          # delivered by earlier pushes. A new version starts from the previous build tag.
          $currentVersionPrefix = "v$crateVersion-build-"
          $previousVersionTag = git tag --merged $env:GITHUB_SHA --sort=-creatordate |
            Where-Object {
              $_ -match '^(v.+-)?build-' -and -not $_.StartsWith($currentVersionPrefix)
            } |
            Select-Object -First 1

          if ($previousVersionTag) {
            $commitLines = @(git log --reverse --no-merges --pretty=format:"- %h %s" "$previousVersionTag..$env:GITHUB_SHA")
          } else {
            $commitLines = @()
          }
          if (-not $commitLines) {
            $commitLines = @(git log --reverse --no-merges -n 20 --pretty=format:"- %h %s")
          }

          $notes = @(
            "版本：v$crateVersion"
            "自动构建：$env:GITHUB_SHA"
            ""
            "本次改动："
            $commitLines
            ""
            "构建产物："
            "- nte-dps-tool-windows-x64.zip：完整 GUI，资源内嵌，包含 plugins/dwmapi.dll、F12 与诊断工具。"
            "- nte-core-windows-x64.zip：本地 stdio Sidecar，供第三方本机工具集成。"
            "- nte-dps-tool-windows-external-resources.zip：完整 GUI，资源外置，包含 plugins/dwmapi.dll，需保持 res、plugins 目录与 exe 同级。"
          ) -join "`n"
          gh release create $releaseTag `
            nte-dps-tool-windows-x64.zip `
            nte-core-windows-x64.zip `
            nte-dps-tool-windows-external-resources.zip `
            --title "v$crateVersion" `
            --notes $notes `
            --latest
